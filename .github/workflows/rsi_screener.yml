name: RSI Screener – Weekly Run

on:
  schedule:
    # Every Saturday at 03:30 UTC  =  09:00 AM IST (UTC+5:30)
    - cron: '28 3 * * 6'

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write   # needed to push the generated Excel/JSON/HTML back to repo

jobs:
  run-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 90   # NSE 500 can take ~60 min; give headroom

    steps:
      # ── 1. Checkout repo ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Python ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Install dependencies ──────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Run Nifty 50 screener ─────────────────────────────────────────────
      - name: Run Nifty 50 Screener
        run: python scripts/RSINSE50.py
        continue-on-error: true

      # ── 5. Run Nifty MidSmallCap 250 screener ───────────────────────────────
      - name: Run Nifty MidSmallCap 250 Screener
        run: python scripts/RSINSE250.py
        continue-on-error: true

      # ── 6. Run NSE 500 screener ──────────────────────────────────────────────
      - name: Run NSE 500 Screener
        run: python scripts/RSINSE500.py
        continue-on-error: true

      # ── 7. Generate HTML report ──────────────────────────────────────────────
      - name: Generate HTML Report
        run: python scripts/generate_html.py

      # ── 8. Commit & push generated files back to repo ───────────────────────
      - name: Commit and push reports
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ docs/
          git diff --cached --quiet || git commit -m "📊 Weekly RSI Screener Report – $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push
